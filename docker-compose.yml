name: adhd-ai-assistant

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: adhd_assistant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./apps/api/.env
    environment:
      # Override DATABASE_URL to use Docker-internal hostname
      DATABASE_URL: postgresql://postgres:postgres@db:5432/adhd_assistant
      DIRECT_URL: postgresql://postgres:postgres@db:5432/adhd_assistant
      NODE_ENV: development
      PORT: "3001"
      HOST: "0.0.0.0"
      CORS_ORIGIN: "http://localhost:3000"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
