name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (commit SHA/branch/tag) to deploy"
        required: false
        default: "main"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm run build:shared

      - name: Build API + web
        run: |
          pnpm --filter @adhd-ai-assistant/api build
          pnpm --filter web build

      - name: Deploy API to Railway (production)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_PRODUCTION: ${{ secrets.RAILWAY_SERVICE_PRODUCTION }}
        run: |
          pnpm dlx @railway/cli up --service "$RAILWAY_SERVICE_PRODUCTION" --detach

      - name: Deploy web to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          pnpm dlx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          pnpm dlx vercel build --prod --token="$VERCEL_TOKEN"
          pnpm dlx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Smoke /health
        env:
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
        run: |
          curl -fsS "$PRODUCTION_API_URL/health"

      - name: Smoke authenticated onboarding/chat
        env:
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          PRODUCTION_TEST_BEARER: ${{ secrets.PRODUCTION_TEST_BEARER }}
        run: |
          curl -fsS "$PRODUCTION_API_URL/api/onboarding" \
            -H "Authorization: Bearer $PRODUCTION_TEST_BEARER"
          curl -fsS "$PRODUCTION_API_URL/api/chat" \
            -H "Authorization: Bearer $PRODUCTION_TEST_BEARER" \
            -H "Content-Type: application/json" \
            -d '{"message":"production smoke test","conversationId":null}'

      - name: Attempt rollback on failure (best effort)
        if: ${{ failure() }}
        continue-on-error: true
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_PRODUCTION: ${{ secrets.RAILWAY_SERVICE_PRODUCTION }}
        run: |
          pnpm dlx @railway/cli rollback --service "$RAILWAY_SERVICE_PRODUCTION"
