# CI pipeline — disabled for now (no tests or staging env yet)
# To re-enable: change `workflow_dispatch` back to `pull_request` + `push`
name: CI

on:
  workflow_dispatch: # manual-only for now

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm run build:shared

      - name: Prisma validate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/adhd_assistant"
          DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/adhd_assistant"
        run: pnpm --filter @adhd-ai-assistant/api exec prisma validate

      - name: Build API
        run: pnpm --filter @adhd-ai-assistant/api build

      - name: Build web
        run: pnpm --filter web build

      - name: Lint web
        run: pnpm --filter web lint
