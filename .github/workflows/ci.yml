name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm run build:shared

      - name: Prisma validate
        run: pnpm --filter @adhd-ai-assistant/api exec prisma validate

      - name: Build API
        run: pnpm --filter @adhd-ai-assistant/api build

      - name: Build web
        run: pnpm --filter web build

      - name: Lint web
        run: pnpm --filter web lint

      - name: API tests
        run: pnpm --filter @adhd-ai-assistant/api test

      - name: Secret log guard
        run: pnpm --filter @adhd-ai-assistant/api security:check-logs

      - name: Dependency audit (high+)
        run: pnpm audit --prod --audit-level high

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
